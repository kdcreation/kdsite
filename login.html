<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KD-SITE Secure Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    min-height:100vh;
    background:radial-gradient(circle at top,#0f2027,#000);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ===== LOGIN CARD ===== */
.login-box{
    width:360px;
    background:transparent;
    border-radius:18px;
    padding:1px;
    position:relative;
    box-shadow:
        0 0 20px rgba(0,255,200,0.25),
        inset 0 0 12px rgba(255,255,255,0.05);
    overflow:hidden;
    
 }


.login-inner{
    background:rgba(0,0,0,0.92);
    border-radius:14px;
    padding:30px;
    box-shadow:
        inset 0 0 18px rgba(255,255,255,0.05),
        0 0 20px rgba(0,255,200,0.2);
}



.login-box h1{
	font-size:25px;
    text-align:center;
    color:#00ffd5;
    margin-bottom:8px;
}

.login-box p{
    text-align:center;
    font-size:14px;
    color:#aaa;
    margin-bottom:20px;
}

/* ===== INPUT ===== */
.field{
    margin-bottom:14px;
    
}

.field label{
    font-size:13px;
    color:#9cffd1;
    
    
}

.field input{
    width:100%;
    padding:10px 14px;
    margin-top:6px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#334d4d;
    color:#eaffea;
    box-shadow:inset 0 0 6px rgba(0,0,0,0.8);
}

.field input:focus{
    box-shadow:0 0 0 1px #00ffd5;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00ffd5,#7f5cff);
    color:#000;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    margin-top:10px;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

/* ===== MESSAGE ===== */
.msg{
    text-align:center;
    margin-top:14px;
    font-size:13px;
    display:none;
}

.msg.error{color:#ff6b6b;}
.msg.success{color:#00ffd5;}

/* ===== FOOTER ===== */
.footer{
    margin-top:18px;
    text-align:center;
    font-size:12px;
    color:#666;
}
</style>
</head>

<body>

<div class="login-box">
    <div class="login-inner">
        
        <h1>KD-SITE</h1>
        <p>Secure Dashboard Access</p>

        <div class="field">
            <label>User ID</label>
            <input type="text" id="userid">
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" id="password">
        </div>

        <button id="loginBtn">Login</button>

        <div class="msg error" id="errorMsg"></div>
        <div class="msg success" id="successMsg"></div>

        <div class="footer">KD-SITE © Secure Access</div>
    </div>
</div>

<script>
/* =====================================================
   KD-SITE LOGIN SCRIPT (Google Sheet + Apps Script)
===================================================== */

/* 🔹 PASTE YOUR APPS SCRIPT WEB APP URL HERE */
const LOGIN_API_URL = "https://script.google.com/macros/s/AKfycbwF5QEsIHcu20uhMO082yGARsTWyS0GRr6BdstvbWgT0067hyM9DCe0g6fBvYK7-E0L/exec";

/* 🔹 DOM ELEMENTS */
const loginForm   = document.getElementById("loginForm");
const usernameInp = document.getElementById("username");
const passwordInp = document.getElementById("password");
const loginBtn    = document.getElementById("loginBtn");
const loginMsg    = document.getElementById("loginMsg"); // optional

/* 🔹 Helper: show message */
function showMessage(text, type = "error") {
    if (!loginMsg) return;
    loginMsg.textContent = text;
    loginMsg.className = type; // error | success | info
}

/* =====================================================
   LOGIN SUBMIT HANDLER
===================================================== */

loginForm.addEventListener("submit", function (e) {
    e.preventDefault();

    const username = usernameInp.value.trim();
    const password = passwordInp.value;

    /* Basic validation */
    if (!username || !password) {
        showMessage("Username & password required");
        return;
    }

    /* UI loading state */
    loginBtn.disabled = true;
    loginBtn.textContent = "Checking...";
    showMessage("Verifying credentials...", "info");

    /* 🔹 Call Apps Script */
    fetch(LOGIN_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {

        /* ❌ Login failed */
        if (!data.success) {
            showMessage(data.message || "Invalid login");
            return;
        }

        /* ✅ Login success */
        showMessage("Login successful. Redirecting...", "success");

        /* 🔐 (Optional) Save session */
        sessionStorage.setItem("kd_logged_in", "true");
        sessionStorage.setItem("kd_user", data.username || username);
        sessionStorage.setItem("kd_role", data.role || "");

        /* 🔀 Redirect (URL comes from Google Sheet) */
        setTimeout(() => {
            window.location.href = data.redirect;
        }, 600);

    })
    .catch(err => {
        console.error(err);
        showMessage("Server not reachable");
    })
    .finally(() => {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
    });
});
</script>


</body>
</html>
